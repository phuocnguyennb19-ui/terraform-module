# ==============================================================================
# APPLICATION CONFIGURATION (Zero-Touch)
# ==============================================================================
# File này chỉ chứa cấu hình cho lớp Dịch vụ (Platform/App Layer). 
# Các cấu hình Hạ tầng nền tảng (VPC, IAM Foundation...) được quản lý riêng.

global:
  environment: "dev"
  region: "us-east-1"
  project: "SM-Platform"
  # Tên bucket chứa state của core infrastructure để Engine có thể lookup
  terraform_state_bucket: "sm-terraform-statefile-dev"

# ==============================================================================
# APPLICATION RESOURCES (Khai báo tài nguyên riêng cho App này)
# ==============================================================================

# 1. Security Group (Mỗi App có SG riêng để kiểm soát port)
security_group:
  enabled: false
  name: "backend-api-sg"
  description: "Allow internal traffic for backend-api"
  ingress_rules: ["http-80-tcp", "https-443-tcp"]
  ingress_cidr_blocks: ["0.0.0.0/0"]

# 2. Application Runner (ECS Service)
service:
  enabled: false
  app_name: "backend-api"
  service_type: "api"
  
  # Computing
  cpu: 256
  memory: 512
  container_port: 8080
  
  # Scaling
  min_capacity: 1
  max_capacity: 5
  
  # Health Check
  health_check_path: "/health"

# 3. Database (Chỉ bật nếu App này cần một RDS Instance riêng)
rds:
  enabled: false
  identifier: "app-specific-db"
  engine: "postgres"
  engine_version: "15.3"
  instance_class: "db.t3.micro"
  allocated_storage: 20

# 4. Cache (Chỉ bật nếu App này cần một Redis riêng)
elasticache:
  enabled: false
  cluster_id: "app-specific-redis"
  engine: "redis"
  node_type: "cache.t3.micro"

# 5. Load Balancer Integration
# Mặc định app sẽ gắn vào ALB dùng chung của hệ thống
alb:
  enabled: true
  use_existing_alb: true
  backend_port: 8080
